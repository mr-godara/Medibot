<link
  href="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css"
  rel="stylesheet"
  id="bootstrap-css"
/>
<script src="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
      integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.5.0/css/all.css"
      integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU"
      crossorigin="anonymous"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='style.css')}}"
    />
  </head>
  <body>
    <div class="container-fluid h-100 mt-4">
      <div class="row justify-content-center h-100">
        <!-- Chat Card (Left) -->
        <div class="col-md-7 col-xl-6 mb-4">
          <div class="card">
            <div class="card-header msg_head">
              <div class="d-flex bd-highlight">
                <div class="img_cont">
                  <img
                    src="https://cdn-icons-png.flaticon.com/512/387/387569.png"
                    class="rounded-circle user_img"
                  />
                  <span class="online_icon"></span>
                </div>
                <div class="user_info">
                  <span>Medical Chatbot</span>
                  <p>Ask me anything!</p>
                </div>
              </div>
            </div>
            <div id="messageFormeight" class="card-body msg_card_body"></div>
            <div class="card-footer">
              <form id="messageArea" class="input-group">
                <input
                  type="text"
                  id="text"
                  name="msg"
                  placeholder="Type your message..."
                  autocomplete="off"
                  class="form-control type_msg"
                  required
                />
                <div class="input-group-append">
                  <button
                    type="submit"
                    id="send"
                    class="input-group-text send_btn"
                  >
                    <i class="fas fa-location-arrow"></i>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
        <!-- Upload Card (Right) -->
        <div class="col-md-5 col-xl-4 mb-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title mb-3 bg-white text-dark p-2 rounded shadow-sm">
                <i class="fas fa-file-upload"></i><span> Upload PDF</span>
              </h5>
              <form
                id="uploadForm"
                enctype="multipart/form-data"
                class="d-flex flex-column align-items-start"
              >
                <div class="custom-file mb-2 w-100">
                  <input
                    type="file"
                    class="custom-file-input"
                    id="pdfFile"
                    name="file"
                    accept=".pdf"
                    required
                  />
                  <label class="custom-file-label" for="pdfFile" id="fileLabel"
                    >Choose PDF file...</label
                  >
                </div>
                <button
                  type="submit"
                  class="btn btn-primary btn-block mt-2"
                  style="width: 100%"
                >
                  Upload
                </button>
              </form>
              <div id="uploadStatus" class="mt-3"></div>
              <div id="currentFile" class="text-muted small mt-1"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Show selected file name
      document
        .getElementById("pdfFile")
        .addEventListener("change", function (e) {
          const fileName = e.target.files[0]
            ? e.target.files[0].name
            : "Choose PDF file...";
          document.getElementById("fileLabel").innerText = fileName;
          document.getElementById("currentFile").innerText =
            fileName !== "Choose PDF file..." ? "Selected: " + fileName : "";
          document.getElementById("uploadStatus").innerText = "";
        });

      document.getElementById("uploadForm").onsubmit = async function (e) {
        e.preventDefault();
        const formData = new FormData(this);
        const res = await fetch("/upload", { method: "POST", body: formData });
        const data = await res.json();
        const fileInput = document.getElementById("pdfFile");
        const fileLabel = document.getElementById("fileLabel");
        const uploadStatus = document.getElementById("uploadStatus");
        const currentFile = document.getElementById("currentFile");

        if (data.success) {
          uploadStatus.innerHTML = `<span class="text-success"><i class="fas fa-check-circle"></i> Upload successful: ${data.filename}</span>`;
          currentFile.innerText = "Currently uploaded: " + data.filename;
        } else {
          uploadStatus.innerHTML = `<span class="text-danger"><i class="fas fa-times-circle"></i> Error: ${
            data.error || "Unknown"
          }</span>`;
          currentFile.innerText = "";
        }
        // Clear file input
        fileInput.value = "";
        fileLabel.innerText = "Choose PDF file...";
      };
    </script>

    <script>
      $(document).ready(function () {
        $("#messageArea").on("submit", function (event) {
          const date = new Date();
          const hour = date.getHours();
          const minute = date.getMinutes();
          const str_time = hour + ":" + minute;
          var rawText = $("#text").val();

          var userHtml =
            '<div class="d-flex justify-content-end mb-4"><div class="msg_cotainer_send">' +
            rawText +
            '<span class="msg_time_send">' +
            str_time +
            '</span></div><div class="img_cont_msg"><img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg"></div></div>';

          $("#text").val("");
          $("#messageFormeight").append(userHtml);

          $.ajax({
            data: {
              msg: rawText,
            },
            type: "POST",
            url: "/get",
          }).done(function (data) {
            var botHtml =
              '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer">' +
              data +
              '<span class="msg_time">' +
              str_time +
              "</span></div></div>";
            $("#messageFormeight").append($.parseHTML(botHtml));
          });
          event.preventDefault();
        });
      });
    </script>
  </body>
</html>
